          content:
            application/json:
              schema:
                $ref: ../schemas/resources/agent-session.v1.schema.json
        '409':
          $ref: '#/components/responses/Problem'
        '428':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/projects/{projectId}:set-capture-mode:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: projectId
        in: path
        required: true
