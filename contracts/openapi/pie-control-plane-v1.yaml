    post:
      tags: [Meetings]
      operationId: requestMeetingDeletion
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/meeting-deletion-request.v1.schema.json
      responses:
        '202':
          description: Meeting deletion queued for the retention worker.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/meeting-governance.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    PieOidc:
      type: openIdConnect
      openIdConnectUrl: https://auth.pielab.ai/realms/pie/.well-known/openid-configuration
      description: The actual issuer is discovered from /.well-known/pie for each instance.
  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        $ref: ../schemas/common/opaque-id.v1.schema.json
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        $ref: ../schemas/common/opaque-id.v1.schema.json
    WorkItemId:
      name: workItemId
      in: path
      required: true
      schema:
        $ref: ../schemas/common/opaque-id.v1.schema.json
    UploadSessionId:
      name: uploadSessionId
      in: path
      required: true
      schema:
        $ref: ../schemas/common/opaque-id.v1.schema.json
    OperationId:
      name: operationId
      in: path
      required: true
      schema:
        $ref: ../schemas/common/opaque-id.v1.schema.json
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        maxLength: 512
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
        pattern: '^"[^" ]+"$'
  headers:
    ETag:
      description: Strong entity tag for the returned resource version.
      required: true
      schema:
        type: string
        pattern: '^"[^" ]+"$'
    Location:
      description: Canonical path of the created resource.
      required: true
      schema:
        type: string
        pattern: '^/v1/'
  responses:
    Problem:
      description: RFC 9457 problem with a stable Pie error code.
      content:
        application/problem+json:
          schema:
            $ref: ../schemas/common/problem-details.v1.schema.json
