openapi: 3.1.2
info:
  title: Pie Control Plane API
  version: 0.1.0
  description: Initial executable contract for instance discovery, session, organizations, projects, and work items.
servers:
  - url: https://api.pielab.ai
security:
  - PieOidc: []
tags:
  - name: Discovery
  - name: Session
  - name: Organizations
  - name: Memberships
  - name: Teams
  - name: Projects
  - name: WorkItems
  - name: AgentIngest
  - name: Artifacts
  - name: Sync
  - name: Operations
  - name: Meetings
  - name: RemoteSessions
paths:
  /.well-known/pie:
    get:
      tags: [Discovery]
      operationId: getInstanceDiscovery
      security: []
      responses:
        '200':
          description: Public instance bootstrap metadata.
          content:
            application/json:
              schema:
                $ref: ../schemas/discovery/instance-discovery.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/session:
    get:
      tags: [Session]
      operationId: getSessionState
      responses:
        '200':
          description: Current Pie account, organization, and permission state without raw tokens.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/session-state.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations:
    get:
      tags: [Organizations]
      operationId: listOrganizations
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: before
          in: query
          required: false
          description: >-
            Pages toward older history from this message id. Mutually exclusive
            with cursor. Results remain oldest-first within the returned page.
          schema:
            $ref: ../schemas/common/opaque-id.v1.schema.json
        - name: latest
          in: query
          required: false
          description: >-
            Opens the newest page instead of the legacy oldest page. Mutually
            exclusive with cursor; may be combined with before.
          schema:
            type: boolean
      responses:
        '200':
          description: Organizations available to the authenticated account.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/resources/organization.v1.schema.json
                  nextCursor:
                    type: [string, 'null']
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/projects:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Projects]
      operationId: listProjects
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Projects visible in the organization.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/resources/project.v1.schema.json
                  nextCursor:
                    type: [string, 'null']
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Projects]
      operationId: createProject
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/project-create.v1.schema.json
      responses:
        '201':
          description: Project created.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/project.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/memberships:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Memberships]
      operationId: listMemberships
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Memberships visible to the caller.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/resources/membership.v1.schema.json
                  nextCursor:
                    type: [string, 'null']
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/teams:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Teams]
      operationId: listTeams
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Teams visible to the caller.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/resources/team.v1.schema.json
                  nextCursor:
                    type: [string, 'null']
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Teams]
      operationId: createTeam
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/team-create.v1.schema.json
      responses:
        '201':
          description: Team created.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/team.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/teams/{teamId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: teamId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    get:
      tags: [Teams]
      operationId: getTeam
      responses:
        '200':
          description: Team representation.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/team.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/projects/{projectId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      operationId: getProject
      responses:
        '200':
          description: Project representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/project.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Projects]
      operationId: updateProject
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: ../schemas/resources/project-update.v1.schema.json
      responses:
        '200':
          description: Project updated.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/project.v1.schema.json
        '412':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/work-items:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [WorkItems]
      operationId: listWorkItems
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: projectId
          in: query
          required: false
          schema:
            $ref: ../schemas/common/opaque-id.v1.schema.json
        - name: assignee
          in: query
          required: false
          description: >-
            My Work filter (doc 30:352). A user id, or the sentinel `me` which
            the server resolves to the authenticated subject's Pie user id.
            assignee is a query filter on the canonical work-items resource, not
            a separate resource URL (doc 23:148-150).
          schema:
            type: string
            maxLength: 64
      responses:
        '200':
          description: Work items visible in the organization.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/resources/work-item.v1.schema.json
                  nextCursor:
                    type: [string, 'null']
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [WorkItems]
      operationId: createWorkItem
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/work-item-create.v1.schema.json
      responses:
        '201':
          description: Work item created.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/work-item.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/work-items/{workItemId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/WorkItemId'
    get:
      tags: [WorkItems]
      operationId: getWorkItem
      responses:
        '200':
          description: Work item representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/work-item.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [WorkItems]
      operationId: updateWorkItem
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: ../schemas/resources/work-item-update.v1.schema.json
      responses:
        '200':
          description: Work item updated.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/work-item.v1.schema.json
        '412':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/work-items/{workItemId}:move-state:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/WorkItemId'
    post:
      tags: [WorkItems]
      operationId: moveWorkItemState
      description: >-
        Board move. Validates fromStateId, toStateId, the team's workflowVersion
        and the item's expectedVersion together (doc 23:118-119). This advances
        the Team WorkItem Workflow only; it never auto-advances a Delivery Stage.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/work-item-move-state.v1.schema.json
      responses:
        '200':
          description: Work item moved to the target state.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/work-item.v1.schema.json
        '412':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/work-items/{workItemId}/source-bindings:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/WorkItemId'
    get:
      tags: [WorkItems]
      operationId: listWorkItemSourceBindings
      description: >-
        Lists the chat-message and meeting-action sources that created this WorkItem.
        Results are filtered by the caller's source permissions and channel membership.
      responses:
        '200':
          description: Source bindings visible to the caller.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/resources/work-item-source-binding.v1.schema.json
                  nextCursor:
                    type: [string, 'null']
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/teams/{teamId}/workflow-states:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: teamId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    get:
      tags: [Teams]
      operationId: listTeamWorkflowStates
      description: >-
        The team's WorkItem Workflow states plus the current workflowVersion a
        board client sends with a move. Read side of the board (doc 27:122-136).
      responses:
        '200':
          description: The team's workflow states.
          content:
            application/json:
              schema:
                type: object
                required: [items, workflowVersion]
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/resources/workflow-state.v1.schema.json
                  workflowVersion:
                    $ref: ../schemas/common/resource-version.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/work-items/{workItemId}/comments:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/WorkItemId'
    get:
      tags: [WorkItems]
      operationId: listWorkItemComments
      description: >-
        Committed comments on a work item, audience-projected: an external role
        sees only customer-visible comments (TEN-004).
      responses:
        '200':
          description: Comments on the work item.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/resources/comment.v1.schema.json
                  nextCursor:
                    type: [string, 'null']
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [WorkItems]
      operationId: createWorkItemComment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/comment-create.v1.schema.json
      responses:
        '201':
          description: Comment created.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/comment.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/work-items/{workItemId}/activity:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/WorkItemId'
    get:
      tags: [WorkItems]
      operationId: listWorkItemActivity
      description: >-
        The work item's Activity timeline — its audit history (state moves,
        assignments, comments, field changes), work-item-scoped only.
      responses:
        '200':
          description: Activity entries for the work item, most recent last.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/resources/work-item-activity-entry.v1.schema.json
                  nextCursor:
                    type: [string, 'null']
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/work-items/{workItemId}:assign:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/WorkItemId'
    post:
      tags: [WorkItems]
      operationId: assignWorkItem
      description: >-
        Changes the assignee (doc 27:437). A distinct action carrying its own
        work_item.assign permission, validated against the item's expectedVersion.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/work-item-assign.v1.schema.json
      responses:
        '200':
          description: Assignee changed.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/work-item.v1.schema.json
        '412':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Collaboration]
      operationId: listChannels
      description: >-
        Channels the caller is a member of. DMs (kind='dm') appear here too; the
        optional kind filter narrows to DMs or normal channels (canonical resource,
        not a separate list).
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            enum: [channel, dm]
      responses:
        '200':
          description: The caller's channels.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/resources/channel.v1.schema.json
                  nextCursor:
                    type: [string, 'null']
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Collaboration]
      operationId: createChannel
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/channel-create.v1.schema.json
      responses:
        '201':
          description: Channel created; the creator is its first member.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/channel.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    get:
      tags: [Collaboration]
      operationId: getChannel
      responses:
        '200':
          description: Channel representation.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/channel.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Collaboration]
      operationId: updateChannel
      description: Updates channel metadata or archives/restores a normal channel using optimistic concurrency.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/channel-update.v1.schema.json
      responses:
        '200':
          description: Updated channel.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/channel.v1.schema.json
        '409':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/members:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    get:
      tags: [Collaboration]
      operationId: listChannelMembers
      responses:
        '200':
          description: Current channel roster.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/resources/channel-member.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Collaboration]
      operationId: addChannelMember
      description: >-
        Adds an org member to a normal channel (channel.manage). Rejected on a DM
        (409) — a DM's roster is fixed at its participants. Idempotent (204).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              additionalProperties: false
              properties:
                userId:
                  $ref: ../schemas/common/opaque-id.v1.schema.json
      responses:
        '204':
          description: Member added (or already present).
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/audit:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    get:
      tags: [Collaboration]
      operationId: listChannelAudit
      description: Lists the latest 200 channel and message governance events for channel managers.
      responses:
        '200':
          description: Recent governance activity, newest first.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/resources/channel-audit-entry.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/export:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    get:
      tags: [Collaboration]
      operationId: exportChannelMessages
      description: Exports up to 10,000 channel messages for channel managers.
      responses:
        '200':
          description: A point-in-time JSON export including tombstone audit metadata.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/channel-message-export.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/retention:apply:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    post:
      tags: [Collaboration]
      operationId: applyChannelRetention
      description: Redacts expired message and revision bodies using the channel retention policy.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Retention applied successfully.
          content:
            application/json:
              schema:
                type: object
                required: [ok, redactedCount]
                additionalProperties: false
                properties:
                  ok:
                    const: true
                  redactedCount:
                    type: integer
                    minimum: 0
        '409':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/members/{userId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
      - name: userId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    delete:
      tags: [Collaboration]
      operationId: removeChannelMember
      description: Removes a member from a normal channel while preserving at least one owner.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Member removed (or was already absent).
        '409':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/dms:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    post:
      tags: [Collaboration]
      operationId: createDm
      description: >-
        Find-or-create the DM between the caller and one other org member. Idempotent
        via a deterministic dm_key: createDm(A,B) and createDm(B,A) return the same
        channel (201 when created, 200 when it already existed).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/dm-create.v1.schema.json
      responses:
        '200':
          description: The existing DM channel.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/channel.v1.schema.json
        '201':
          description: The newly created DM channel.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/channel.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/group-dms:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    post:
      tags: [Collaboration]
      operationId: createGroupDm
      description: >-
        Find-or-create the N-party group DM among the caller and the listed org members.
        The caller is implicit and need not be listed. Idempotent via a deterministic
        dm_key over the full participant set, so {A,B,C} is a different channel than the
        1:1 {A,B} (201 when created, 200 when it already existed). The roster is fixed at
        creation; a group DM is a channel with kind='dm'.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/group-dm-create.v1.schema.json
      responses:
        '200':
          description: The existing group DM channel.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/channel.v1.schema.json
        '201':
          description: The newly created group DM channel.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/channel.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/messages:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    get:
      tags: [Collaboration]
      operationId: listChannelMessages
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: threadRoot
          in: query
          required: false
          description: >-
            Thread filter. When set to a root message id, returns only that thread's
            replies (messages is one resource; a thread is a query filter, doc
            23:148-150). Omitted returns the whole channel timeline.
          schema:
            $ref: ../schemas/common/opaque-id.v1.schema.json
      responses:
        '200':
          description: >-
            Messages in chronological order within each page. Cursor pages
            forward; latest and before page backward through channel history.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/resources/message.v1.schema.json
                  nextCursor:
                    type: [string, 'null']
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Collaboration]
      operationId: postMessage
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/message-create.v1.schema.json
      responses:
        '201':
          description: Message posted; a resource.changed invalidation is delivered to members.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/message.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/messages/{messageId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
      - name: messageId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    get:
      tags: [Collaboration]
      operationId: getChannelMessage
      description: Fetches one message so notification links can open content outside the loaded page.
      responses:
        '200':
          description: Message representation.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/message.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Collaboration]
      operationId: editMessage
      description: >-
        Edits a message under optimistic concurrency (doc 33 §1). Author-only — a
        moderator may delete but never edit. The original body is preserved in the
        immutable revision history; the response carries the "(edited)" marker.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/message-edit.v1.schema.json
      responses:
        '200':
          description: The updated message with its new body and edit marker.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/message.v1.schema.json
        '409':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Collaboration]
      operationId: deleteMessage
      description: >-
        Soft-deletes a message into a tombstone (doc 33 §2): author, or a channel
        moderator (channel.manage). The body — and every stored revision body — is
        redacted while who/when/why audit metadata is retained; the row, reactions and
        thread pointer survive. A moderator deleting another user's message must supply a
        reason. Idempotent — re-deleting a tombstone is a no-op 204.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason:
                  type: string
                  minLength: 1
                  maxLength: 500
      responses:
        '204':
          description: Message deleted (or was already a tombstone).
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/messages/search:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Collaboration]
      operationId: searchMessages
      description: >-
        Full-text search over message bodies, most recent first. Member-scoped: only
        hits from channels the caller is currently on are returned, even within their
        own org (chat slice 7). Read-only.
      parameters:
        - name: q
          in: query
          required: true
          description: The search query. Parsed with websearch_to_tsquery('simple').
          schema:
            type: string
            minLength: 1
            maxLength: 1000
        - $ref: '#/components/parameters/Cursor'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: A keyset-paginated page of matching message summaries, most recent first.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/message-search-result.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/messages/{messageId}/reactions:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
      - name: messageId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    post:
      tags: [Collaboration]
      operationId: addReaction
      description: >-
        Adds the caller's reaction to a message. Idempotent on the (message, user,
        emoji) key; returns the message with its updated reactions summary.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              additionalProperties: false
              properties:
                emoji:
                  type: string
                  minLength: 1
                  maxLength: 32
      responses:
        '200':
          description: The message with its updated reactions summary.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/message.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Collaboration]
      operationId: removeReaction
      description: >-
        Removes the caller's reaction. Idempotent — removing a reaction that is not
        present is a no-op 204, not an error.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: emoji
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 32
      responses:
        '204':
          description: Reaction removed (or was already absent).
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/typing:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    post:
      tags: [Collaboration]
      operationId: signalTyping
      description: >-
        Fire-and-forget typing signal (member-gated). Writes no row and never
        touches the durable outbox — it relays an ephemeral typing.changed to the
        channel's other members over the realtime gateway. Rate-capped per user.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Signal accepted (or coalesced by the rate cap).
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/attachments/intents:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    post:
      tags: [Collaboration]
      operationId: createAttachmentUploadIntent
      description: >-
        Reserves a tenant-scoped key in the attachments zone and returns a presigned
        PUT (member-gated). Reuses the R2 object-storage machinery — not a second
        uploader. The client PUTs the bytes, then references the intent id in a post.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/attachment-intent-create.v1.schema.json
      responses:
        '201':
          description: Upload intent with a presigned PUT URL.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/attachment-intent.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/attachments/{attachmentId}/download:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
      - name: attachmentId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    get:
      tags: [Collaboration]
      operationId: getAttachmentDownload
      description: >-
        A short-lived presigned GET for an attachment, member-gated — so a revoked
        member can no longer obtain one (URLs are re-issued through the gate).
      responses:
        '200':
          description: A short-lived download URL.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/attachment-download.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/read:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    post:
      tags: [Collaboration]
      operationId: markChannelRead
      description: Advances the caller's own read cursor to a given message id.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lastReadMessageId]
              additionalProperties: false
              properties:
                lastReadMessageId:
                  $ref: ../schemas/common/opaque-id.v1.schema.json
      responses:
        '200':
          description: The caller's updated read cursor.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/read-cursor.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/mute:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    put:
      tags: [Collaboration]
      operationId: muteChannel
      description: >-
        Mutes a channel for the caller (member-gated). Suppresses @channel/@here
        broadcast notifications from the channel; a direct @mention still notifies the
        caller. Idempotent — a repeat PUT is a no-op 204, not an error.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Channel muted (or was already muted).
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Collaboration]
      operationId: unmuteChannel
      description: >-
        Unmutes a channel for the caller (member-gated). Idempotent — unmuting a
        channel that is not muted is a no-op 204, not an error.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Channel unmuted (or was already not muted).
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/messages/{messageId}/pin:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
      - name: messageId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    put:
      tags: [Collaboration]
      operationId: pinMessage
      description: >-
        Pins a message in its channel (member-gated). v1 lets any channel member pin, up
        to a per-channel cap. Idempotent — a repeat pin is a no-op 204. A deleted
        (tombstoned) message is not pinnable (409), and the cap is enforced (409).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Message pinned (or was already pinned).
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Collaboration]
      operationId: unpinMessage
      description: >-
        Unpins a message (member-gated). Idempotent — unpinning a message that is not
        pinned is a no-op 204, not an error.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Message unpinned (or was already not pinned).
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/pins:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    get:
      tags: [Collaboration]
      operationId: listPinnedMessages
      description: >-
        Lists a channel's pinned messages, most-recent-pin first (member-gated). Each
        item is a message summary plus who pinned it and when.
      responses:
        '200':
          description: The channel's pinned messages.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/pinned-messages.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/messages/{messageId}/work-items:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: channelId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
      - name: messageId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    post:
      tags: [Collaboration]
      operationId: convertMessageToWorkItem
      description: >-
        Converts a chat message into a delivery work item (doc 33 §4), bridging
        collaboration and delivery. Requires BOTH message.read (source) and
        work_item.create (target); a caller with only one is denied 403. The actor must be
        a member of the source channel. title is optional — derived from the message body
        when omitted. Idempotent per Idempotency-Key and per source message; a second
        conversion request returns the already-linked WorkItem instead of creating another.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources/message-work-item-conversion.v1.schema.json
      responses:
        '201':
          description: Work item created from the message.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/work-item.v1.schema.json
        '200':
          description: The WorkItem already linked to this source message.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/work-item.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
    get:
      tags: [Collaboration]
      operationId: listMessageWorkItemLinks
      description: >-
        Lists the work items a message has been converted into (doc 33 §4), most-recent
        first (member-gated).
      responses:
        '200':
          description: The message's work-item conversion links.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [linkId, workItemId, createdBy, createdAt]
                      properties:
                        linkId:
                          $ref: ../schemas/common/opaque-id.v1.schema.json
                        workItemId:
                          $ref: ../schemas/common/opaque-id.v1.schema.json
                        createdBy:
                          $ref: ../schemas/common/opaque-id.v1.schema.json
                        createdAt:
                          type: string
                          format: date-time
                  nextCursor:
                    type: [string, 'null']
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/notifications:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
