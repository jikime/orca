            schema:
              $ref: ../schemas/resources/notification-preferences-update.v1.schema.json
      responses:
        '200':
          description: Updated preferences.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/notification-preferences.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/channels/{channelId}/notification-level:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
