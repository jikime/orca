  /v1/organizations/{organizationId}/meetings/{meetingId}/capture/resume:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: meetingId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    post:
      tags: [Meetings]
      operationId: resumeMeetingCapture
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Capture resumed after consent was revalidated.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/meeting-recording.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/meetings/{meetingId}/governance-export:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: meetingId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    get:
      tags: [Meetings]
      operationId: exportMeetingGovernanceData
      responses:
        '200':
          description: Audited JSON export of meeting data.
          content:
            application/json:
              schema:
                $ref: ../schemas/resources/meeting-governance-export.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/meetings/{meetingId}/governance-audit:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: meetingId
        in: path
        required: true
        schema:
          $ref: ../schemas/common/opaque-id.v1.schema.json
    get:
      tags: [Meetings]
      operationId: listMeetingGovernanceAudit
      responses:
        '200':
          description: Governance audit entries.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, actorId, action, occurredAt]
                      properties:
                        id:
                          $ref: ../schemas/common/opaque-id.v1.schema.json
                        actorId:
                          oneOf:
                            - $ref: ../schemas/common/opaque-id.v1.schema.json
                            - type: 'null'
                        action:
                          type: string
                        occurredAt:
                          $ref: ../schemas/common/timestamp.v1.schema.json
        default:
          $ref: '#/components/responses/Problem'
  /v1/organizations/{organizationId}/meetings/{meetingId}/deletion-requests:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - name: meetingId
